<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle with chocolate brown gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3e1f00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b3f00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" />
  <circle cx="100" cy="100" r="96" fill="none" stroke="#c0703a" stroke-width="4" />

  <!-- Terminal window -->
  <rect x="30" y="55" width="140" height="95" rx="8" ry="8" fill="url(#termGrad)" />
  <!-- Title bar -->
  <rect x="30" y="55" width="140" height="22" rx="8" ry="8" fill="#2a2a3e" />
  <rect x="30" y="66" width="140" height="11" fill="#2a2a3e" />
  <!-- Window buttons -->
  <circle cx="47" cy="66" r="5" fill="#ff5f57" />
  <circle cx="63" cy="66" r="5" fill="#febc2e" />
  <circle cx="79" cy="66" r="5" fill="#28c840" />

  <!-- Terminal prompt -->
  <text x="40" y="100" font-family="monospace" font-size="13" fill="#c0703a" font-weight="bold">$</text>
  <text x="52" y="100" font-family="monospace" font-size="13" fill="#e0e0e0">choco</text>
  <text x="104" y="100" font-family="monospace" font-size="13" fill="#c0703a">Help</text>

  <!-- Second line -->
  <text x="40" y="118" font-family="monospace" font-size="11" fill="#888">#!/bin/bash</text>

  <!-- Third line / cursor blink -->
  <text x="40" y="136" font-family="monospace" font-size="13" fill="#c0703a" font-weight="bold">$</text>
  <rect x="52" y="124" width="8" height="14" fill="#c0703a" opacity="0.8" />

  <!-- Chocolate chip dots decoration -->
  <circle cx="100" cy="172" r="5" fill="#c0703a" opacity="0.9" />
  <circle cx="116" cy="175" r="4" fill="#c0703a" opacity="0.7" />
  <circle cx="84" cy="175" r="4" fill="#c0703a" opacity="0.7" />
</svg>
